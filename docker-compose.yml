services:
  postgres:
    image: postgres:16-alpine
    container_name: devsvault-postgres
    environment:
      POSTGRES_DB: devsvault
      POSTGRES_USER: devsvault
      POSTGRES_PASSWORD: devsvault_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsvault -d devsvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devsvault-redis
    profiles: ["optional"]
    ports:
      - "6379:6379"

volumes:
  postgres-data: